<div class="contenedor">
  <div class="email">
    <input type="text" placeholder="Ingrese Correo" [(ngModel)]='correo'>
  </div>
  <div class="pass">
    <input type="password" placeholder="Ingrese Contraseña" [(ngModel)]='password'>
  </div>
  <div class="errorRegistro">
    <div *ngIf="msjError">
      <div class="alert alert-danger" role="alert">{{msjError}}</div>
    </div>
  </div>
  <div class="botton">
    <button (click)="Register()">REGISTRARSE</button>
  </div>
</div>
