<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<form name="juego">
   <label>INGRESE NUMERO:  </label>  <input [(ngModel)]="nuevoJuego.numeroIngresado" placeholder="ingrese numero" name="numeroIngresado" type="text" class="form-control" style="width:50%"/>
    <h1>{{nuevoJuego.numeroIngresado}}  </h1>

    <h2 [hidden]="ocultarVerificar"><button  *ngIf="nuevoJuego.numeroSecreto!=0" (click)="verificar()" class="verificar">Verificar</button></h2>

    <h2><button *ngIf="nuevoJuego.numeroSecreto==0 " (click)="generarnumero()"  class="nuevoNumero">Nuevo número secreto</button></h2>

    <h2><p *ngIf="nuevoJuego.numeroSecreto!=0" ><i class="fa fa-spinner fa-spin"></i>Esperando que ingrese un número</p></h2>
    <h3 [hidden]="!nuevoJuego.gano">Adivino el número</h3>
    <h3 [hidden]="nuevoJuego.gano">Aún no gano </h3>
    <div class="Exit">
        <h4 routerLink="/Juegos">Atras</h4>
    </div>
</form>
<div id="snackbar">{{Mensajes}}</div>
